<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/style.css" />
    <title>Landing Page</title>
  </head>
  <body>
    <header class="header">
      <div class="contenedor contenido-header">
        <div class="imagen-header">
          <picture>
            <source
              sizes="1920w"
              srcset="img/header.avif 1920w"
              type="image/avif"
            />
            <source
              sizes="1920w"
              srcset="img/header.webp 1920w"
              type="image/webp"
            />
            <source
              sizes="1920w"
              srcset="img/header.png 1920w"
              type="image/jpeg"
            />
            <img
              loading="lazy"
              decoding="async"
              src="img/header.png"
              lazyalt="imagen"
              width="1000"
              height="600"
            />
          </picture>
        </div>

        <div class="texto-header">
          <p class="frase-producto">Calidad que se escucha</p>
          <h1 class="nombre-producto">Aurora Sound</h1>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusantium
            architecto vitae cumque accusamus at dolorum explicabo. Iure ad
            optio, aspernatur esse facere maxime quia quasi adipisci dolorum
            voluptatem eum dolores.
          </p>
          <p class="precio-producto">Desde <span>$399</span></p>
        </div>
      </div>
    </header>
  </body>
</html>
